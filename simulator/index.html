<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파트장 성과급 시뮬레이터</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #F4F6FA; color: #1A2744; min-height: 100vh; }

  header { background: #1A2744; color: white; padding: 20px 32px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 20px; font-weight: 600; }
  header span { font-size: 13px; opacity: 0.6; margin-left: auto; }

  .container { max-width: 960px; margin: 0 auto; padding: 28px 20px; }

  .rule-bar { background: #FFF8E1; border: 1px solid #FFD600; border-radius: 10px; padding: 12px 18px; font-size: 13px; color: #7B5800; margin-bottom: 24px; line-height: 1.7; }
  .rule-bar strong { color: #1A2744; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media(max-width:600px){ .grid2 { grid-template-columns: 1fr; } }

  .card { background: white; border-radius: 12px; border: 1px solid #E2E8F0; padding: 20px 24px; }
  .card-title { font-size: 13px; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
  .card-title svg { width: 16px; height: 16px; }

  label { display: block; font-size: 13px; color: #475569; margin-bottom: 5px; }
  input[type=text], input[type=number] {
    width: 100%; padding: 10px 14px; border: 1.5px solid #E2E8F0; border-radius: 8px;
    font-size: 15px; color: #1A2744; background: #F8FAFC; transition: border 0.15s;
    margin-bottom: 14px;
  }
  input:focus { outline: none; border-color: #2D4A8A; background: white; }
  input:last-child { margin-bottom: 0; }

  .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .badge { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 5px 11px; border-radius: 99px; border: 1px solid; transition: all 0.2s; }
  .badge.hit  { background: #E8F5E9; color: #1B5E20; border-color: #4CAF50; }
  .badge.miss { background: #FFF0F0; color: #B71C1C; border-color: #EF9A9A; }

  .result-card { background: #1A2744; color: white; border-radius: 14px; padding: 24px 28px; margin-bottom: 20px; }
  .result-top { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 16px; }
  .result-name { font-size: 13px; opacity: 0.6; margin-bottom: 4px; }
  .result-amount { font-size: 38px; font-weight: 700; letter-spacing: -1px; }
  .result-rate-big { font-size: 22px; font-weight: 500; opacity: 0.75; padding-bottom: 4px; }

  .bar-wrap { background: rgba(255,255,255,0.15); border-radius: 99px; height: 8px; overflow: hidden; margin-bottom: 6px; }
  .bar-fill { height: 8px; border-radius: 99px; background: #4ADE80; transition: width 0.35s ease; }
  .bar-fill.max { background: #FACC15; }
  .bar-label { font-size: 11px; opacity: 0.5; text-align: right; }

  .breakdown-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 18px; }
  .bk { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; text-align: center; }
  .bk-label { font-size: 11px; opacity: 0.55; margin-bottom: 4px; }
  .bk-val { font-size: 15px; font-weight: 600; }
  .bk-val.add { color: #4ADE80; }

  .scenario-card { background: white; border-radius: 12px; border: 1px solid #E2E8F0; padding: 20px 24px; margin-bottom: 20px; }
  .scenario-title { font-size: 13px; font-weight: 600; color: #64748B; margin-bottom: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 6px 10px; color: #94A3B8; font-weight: 500; border-bottom: 1px solid #F1F5F9; }
  td { padding: 9px 10px; border-bottom: 1px solid #F8FAFC; color: #334155; }
  tr:last-child td { border-bottom: none; }
  tr.current td { background: #EFF6FF; font-weight: 600; color: #1A2744; }
  .pill { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 99px; }
  .pill-blue { background: #DBEAFE; color: #1E40AF; }
  .pill-green { background: #DCFCE7; color: #166534; }
  .pill-gray { background: #F1F5F9; color: #94A3B8; }

  .history-card { background: white; border-radius: 12px; border: 1px solid #E2E8F0; padding: 20px 24px; }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .history-title { font-size: 13px; font-weight: 600; color: #64748B; }
  .btn-add { background: #1A2744; color: white; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer; font-weight: 500; }
  .btn-add:hover { background: #2D4A8A; }
  .btn-clear { background: none; border: 1px solid #E2E8F0; border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer; color: #94A3B8; }
  .btn-clear:hover { border-color: #EF4444; color: #EF4444; }
  .empty { text-align: center; color: #CBD5E1; font-size: 13px; padding: 20px; }

  footer { text-align: center; font-size: 12px; color: #94A3B8; padding: 20px; }
</style>
</head>
<body>

<header>
  <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="1.8"><path d="M9 7H6a2 2 0 00-2 2v9a2 2 0 002 2h12a2 2 0 002-2V9a2 2 0 00-2-2h-3m-6 0V5a2 2 0 114 0v2m-4 0h4"/></svg>
  <h1>파트장 성과급 시뮬레이터</h1>
  <span>기본 2.0% ~ 최대 3.0%</span>
</header>

<div class="container">

  <div class="rule-bar">
    <strong>지급 기준</strong> &nbsp;|&nbsp;
    기본 <strong>2.0%</strong> &nbsp;+&nbsp;
    분기 취급고 1억↑ <strong>+0.4%</strong> &nbsp;+&nbsp;
    B2B 매출 3,000만↑ <strong>+0.2%</strong> &nbsp;+&nbsp;
    B2G 입찰 3회↑ <strong>+0.4%</strong> &nbsp;=&nbsp;
    최대 <strong>3.0%</strong>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        입력
      </div>
      <label>파트장 이름</label>
      <input type="text" id="name" value="홍길동" placeholder="예) 홍길동">
      <label>분기 (예: 2024 4분기)</label>
      <input type="text" id="quarter" value="2024 4분기" placeholder="예) 2024 4분기">
      <label>분기 취급고 합계 (원)</label>
      <input type="number" id="revenue" value="150000000" step="1000000" placeholder="예) 150000000">
      <label>B2B 매출 (원)</label>
      <input type="number" id="b2b" value="35000000" step="1000000" placeholder="예) 35000000">
      <label>B2G 입찰 참여 횟수</label>
      <input type="number" id="b2g" value="5" min="0">
    </div>

    <div>
      <div id="badges" class="badge-row"></div>

      <div class="result-card">
        <div class="result-top">
          <div>
            <div class="result-name" id="res-name">홍길동</div>
            <div class="result-amount" id="res-bonus">—</div>
          </div>
          <div class="result-rate-big" id="res-rate">—</div>
        </div>
        <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
        <div class="bar-label">최대 3.0% 기준</div>
        <div class="breakdown-grid">
          <div class="bk"><div class="bk-label">기본</div><div class="bk-val">2.0%</div></div>
          <div class="bk"><div class="bk-label">가산 합계</div><div class="bk-val add" id="res-add">—</div></div>
          <div class="bk"><div class="bk-label">최종 지급률</div><div class="bk-val" id="res-final">—</div></div>
        </div>
      </div>

      <div class="scenario-card">
        <div class="scenario-title">시나리오 비교</div>
        <table>
          <thead><tr><th>케이스</th><th style="text-align:right">취급고</th><th style="text-align:right">지급률</th><th style="text-align:right">성과급</th></tr></thead>
          <tbody id="scenario-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="history-card">
    <div class="history-header">
      <div class="history-title">📋 계산 기록</div>
      <div style="display:flex;gap:8px;">
        <button class="btn-add" onclick="saveRecord()">현재 결과 저장</button>
        <button class="btn-clear" onclick="clearHistory()">전체 삭제</button>
      </div>
    </div>
    <div id="history-body"><div class="empty">저장된 기록이 없습니다</div></div>
  </div>

</div>

<footer>성과급 시뮬레이터 · 기준 변경 시 코드 내 수치 수정 필요</footer>

<script>
let history = JSON.parse(localStorage.getItem('bonus_history') || '[]');

function fmt(n){ return Math.round(n).toLocaleString('ko-KR') + '원'; }
function fmtW(n){ return Math.round(n/10000).toLocaleString('ko-KR') + '만원'; }
function fmtR(r){ return (r*100).toFixed(1) + '%'; }

function calc(rev, b2b, b2g){
  const addRev = rev >= 100000000 ? 0.004 : 0;
  const addB2b = b2b >= 30000000  ? 0.002 : 0;
  const addB2g = b2g >= 3         ? 0.004 : 0;
  const rate = 0.02 + addRev + addB2b + addB2g;
  return { rate, addRev, addB2b, addB2g, bonus: rev * rate };
}

function update(){
  const name = document.getElementById('name').value || '파트장';
  const rev  = parseFloat(document.getElementById('revenue').value) || 0;
  const b2b  = parseFloat(document.getElementById('b2b').value) || 0;
  const b2g  = parseFloat(document.getElementById('b2g').value) || 0;
  const r = calc(rev, b2b, b2g);

  document.getElementById('res-name').textContent = name;
  document.getElementById('res-bonus').textContent = fmt(r.bonus);
  document.getElementById('res-rate').textContent = fmtR(r.rate);
  document.getElementById('res-add').textContent = '+' + fmtR(r.addRev + r.addB2b + r.addB2g);
  document.getElementById('res-final').textContent = fmtR(r.rate);

  const pct = Math.min((r.rate / 0.03) * 100, 100);
  const bar = document.getElementById('bar');
  bar.style.width = pct + '%';
  bar.className = 'bar-fill' + (r.rate >= 0.03 ? ' max' : '');

  const badges = [
    { label: '취급고 1억+', hit: rev >= 100000000, add: '+0.4%' },
    { label: 'B2B 3천만+', hit: b2b >= 30000000,  add: '+0.2%' },
    { label: '입찰 3회+',  hit: b2g >= 3,          add: '+0.4%' },
  ];
  document.getElementById('badges').innerHTML = badges.map(b =>
    `<div class="badge ${b.hit?'hit':'miss'}">${b.hit?'✓':'✗'} ${b.label} ${b.hit?b.add:'미달'}</div>`
  ).join('');

  const scenarios = [
    { label: '기본만',    rev, b2b:0,           b2g:0 },
    { label: 'B2B 달성', rev, b2b:30000000,     b2g:0 },
    { label: '입찰 달성', rev, b2b:0,           b2g:3 },
    { label: '모두 달성', rev:Math.max(rev,100000000), b2b:Math.max(b2b,30000000), b2g:Math.max(b2g,3) },
  ];
  document.getElementById('scenario-body').innerHTML = scenarios.map(s => {
    const sr = calc(s.rev, s.b2b, s.b2g);
    const isCur = s.rev===rev && s.b2b===b2b && s.b2g===b2g;
    return `<tr class="${isCur?'current':''}">
      <td>${s.label}${isCur?' <span class="pill pill-blue">현재</span>':''}</td>
      <td style="text-align:right">${Math.round(s.rev/10000).toLocaleString()}만</td>
      <td style="text-align:right">${fmtR(sr.rate)}</td>
      <td style="text-align:right">${Math.round(sr.bonus/10000).toLocaleString()}만원</td>
    </tr>`;
  }).join('');
}

function saveRecord(){
  const name    = document.getElementById('name').value || '파트장';
  const quarter = document.getElementById('quarter').value || '';
  const rev  = parseFloat(document.getElementById('revenue').value) || 0;
  const b2b  = parseFloat(document.getElementById('b2b').value) || 0;
  const b2g  = parseFloat(document.getElementById('b2g').value) || 0;
  const r = calc(rev, b2b, b2g);
  history.unshift({ name, quarter, rev, b2b, b2g, rate: r.rate, bonus: r.bonus, date: new Date().toLocaleDateString('ko-KR') });
  localStorage.setItem('bonus_history', JSON.stringify(history));
  renderHistory();
}

function clearHistory(){
  if(confirm('계산 기록을 모두 삭제할까요?')){ history=[]; localStorage.removeItem('bonus_history'); renderHistory(); }
}

function renderHistory(){
  const el = document.getElementById('history-body');
  if(!history.length){ el.innerHTML='<div class="empty">저장된 기록이 없습니다</div>'; return; }
  el.innerHTML = `<table><thead><tr>
    <th>날짜</th><th>분기</th><th>파트장</th><th style="text-align:right">취급고</th>
    <th style="text-align:right">B2B</th><th style="text-align:center">입찰</th>
    <th style="text-align:right">지급률</th><th style="text-align:right">성과급</th>
  </tr></thead><tbody>` +
  history.map((h,i) => `<tr>
    <td>${h.date}</td>
    <td>${h.quarter||'-'}</td>
    <td><strong>${h.name}</strong></td>
    <td style="text-align:right">${Math.round(h.rev/10000).toLocaleString()}만</td>
    <td style="text-align:right">${Math.round(h.b2b/10000).toLocaleString()}만</td>
    <td style="text-align:center">${h.b2g}회</td>
    <td style="text-align:right"><span class="pill ${h.rate>=0.03?'pill-green':'pill-gray'}">${fmtR(h.rate)}</span></td>
    <td style="text-align:right"><strong>${Math.round(h.bonus/10000).toLocaleString()}만원</strong></td>
  </tr>`).join('') + '</tbody></table>';
}

['name','quarter','revenue','b2b','b2g'].forEach(id => {
  document.getElementById(id).addEventListener('input', update);
});
update();
renderHistory();

function toKSTDate(ts){
  if(!ts) return '-';
  return new Date(ts).toLocaleDateString('ko-KR',{timeZone:'Asia/Seoul',year:'numeric',month:'2-digit',day:'2-digit'});
}
function toKSTDateTime(ts){
  if(!ts) return '-';
  return new Date(ts).toLocaleString('ko-KR',{timeZone:'Asia/Seoul',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
}
function toKSTTimeAgo(ts){
  if(!ts) return '-';
  const diff=(Date.now()-new Date(ts))/1000;
  if(diff<60)return '방금 전';
  if(diff<3600)return Math.floor(diff/60)+'분 전';
  if(diff<86400)return Math.floor(diff/3600)+'시간 전';
  return toKSTDate(ts);
}
</script>
</body>
</html>
