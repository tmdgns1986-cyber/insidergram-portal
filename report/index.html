<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운영 보고서 만들기 (테스트용 v3)</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F5F6FA;color:#1A1D27;font-size:14px}
.wrap{max-width:1000px;margin:0 auto;padding:24px 20px 80px}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.crumb{font-size:13px;color:#9EA5B8}
.crumb b{color:#1A1D27;cursor:pointer}
.crumb b:hover{text-decoration:underline}
h1{font-size:19px;font-weight:700;margin-bottom:4px}
.lead{font-size:12px;color:#6B7080;margin-bottom:18px;line-height:1.6}
.note-box{background:#FFF7E6;border:1px solid #FBCB6B;border-radius:8px;padding:10px 14px;font-size:11px;color:#8A5A00;line-height:1.6;margin-bottom:18px}
.card{background:#fff;border:1px solid #E8EAF0;border-radius:12px;margin-bottom:16px;overflow:hidden}
.card-head{padding:13px 18px;background:#F5F6FA;border-bottom:1px solid #E8EAF0;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:700;color:#1A1D27}
.card-body{padding:18px}
.row{display:grid;gap:12px;margin-bottom:12px}
.row:last-child{margin-bottom:0}
.row.c2{grid-template-columns:1fr 1fr}
.row.c3{grid-template-columns:1fr 1fr 1fr}
.field label{font-size:11px;font-weight:600;color:#6B7080;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;border:1px solid #D0D4E0;border-radius:7px;font-size:13px;font-family:inherit;color:#1A1D27}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#6C63FF}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #D0D4E0;background:#fff;color:#1A1D27;font-family:inherit}
.btn:hover{background:#F5F6FA}
.btn-primary{background:#6C63FF;color:#fff;border-color:#6C63FF}
.btn-primary:hover{background:#5B53EE}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-danger{color:#EF4444;border-color:#fca5a5}
.btn-danger:hover{background:#FEE2E2}
.btn-sm{padding:5px 10px;font-size:11px}
.mini-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.mini-table th{font-size:10px;color:#9EA5B8;text-transform:uppercase;letter-spacing:.04em;text-align:left;padding:0 6px 6px;font-weight:600}
.mini-table td{padding:4px 6px;vertical-align:top}
.mini-table input, .mini-table select{width:100%;padding:6px 8px;border:1px solid #D0D4E0;border-radius:6px;font-size:12px;font-family:inherit}
.add-row-btn{font-size:12px;color:#6C63FF;background:none;border:none;cursor:pointer;font-weight:600;padding:4px 0;font-family:inherit}
.add-row-btn:hover{text-decoration:underline}
.thumb{width:36px;height:36px;object-fit:cover;border-radius:5px;border:1px solid #E8EAF0}
.thumb-placeholder{width:36px;height:36px;border-radius:5px;border:1px dashed #D0D4E0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#9EA5B8}

/* ── Account list / detail ── */
.acct-table{width:100%;border-collapse:collapse}
.acct-table th{font-size:11px;color:#9EA5B8;text-align:left;padding:8px 10px;border-bottom:1px solid #E8EAF0}
.acct-table td{padding:12px 10px;border-bottom:1px solid #F0F1F5;font-size:13px}
.acct-row{cursor:pointer;transition:background .1s}
.acct-row:hover{background:#F8F9FC}
.badge-month{display:inline-block;background:#EEF0FF;color:#534AB7;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px}
.empty-msg{padding:40px 20px;text-align:center;color:#9EA5B8;font-size:13px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:6px}
.detail-item{background:#F5F6FA;border:1px solid #E8EAF0;border-radius:8px;padding:12px 14px}
.detail-item .k{font-size:10px;color:#9EA5B8;margin-bottom:3px}
.detail-item .v{font-size:14px;font-weight:600;color:#1A1D27}

/* ── Report type picker ── */
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.type-card{border:1px solid #E8EAF0;border-radius:10px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .15s}
.type-card:hover{border-color:#6C63FF;background:#FAFAFF}
.type-card.disabled{cursor:not-allowed;opacity:.5}
.type-card.disabled:hover{border-color:#E8EAF0;background:#fff}
.type-icon{font-size:26px;margin-bottom:8px}
.type-name{font-size:13px;font-weight:700;margin-bottom:4px}
.type-status{font-size:10px;color:#9EA5B8}
.type-status.active{color:#22C55E;font-weight:600}

/* ── Naver import box ── */
.import-box{background:#1B3A57;color:#fff;border-radius:10px;padding:16px 18px;margin-bottom:16px}
.import-box .it{font-size:13px;font-weight:700;margin-bottom:6px}
.import-box .id{font-size:11px;opacity:.8;margin-bottom:10px;line-height:1.6}
.import-status{font-size:11px;margin-top:8px;color:#B9D4FF}
.import-checklist{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.chip{font-size:10px;padding:4px 9px;border-radius:99px;background:rgba(255,255,255,.12)}
.chip.done{background:#22C55E;color:#fff}

/* ── Preview ── */
#preview-wrap{overflow-x:auto;padding:20px 0;background:#20222B;border-radius:12px;margin-top:8px}
#preview-strip{display:flex;gap:16px;padding:0 20px;width:max-content}
.preview-slide-outer{width:384px;height:216px;flex-shrink:0;overflow:hidden;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.3);position:relative;background:#fff}
.preview-slide-outer .scaler{width:1280px;height:720px;transform:scale(0.3);transform-origin:top left}
.preview-label{color:rgba(255,255,255,.5);font-size:11px;text-align:center;margin-top:6px;width:384px;flex-shrink:0}
.slide-col{display:flex;flex-direction:column;flex-shrink:0}

/* ── Slide template (portrait report page) ── */
.slide{width:1280px;height:720px;background:#fff;position:relative;font-family:'Pretendard',sans-serif;overflow:hidden}
.sl-pad{padding:26px 46px}
.sl-eyebrow{display:inline-block;font-size:10.5px;font-weight:700;color:#1B3A57;background:#EAF0F8;padding:4px 13px;border-radius:99px;margin-bottom:12px;letter-spacing:.02em}
.sl-title-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.sl-icon-badge{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1B3A57,#2F6FB3);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 3px 8px rgba(27,58,87,.25)}
.sl-title{font-size:20px;font-weight:800;color:#111;line-height:1.3}
.sl-underline{width:56px;height:4px;background:linear-gradient(90deg,#1B3A57,#5FA8E0);border-radius:2px;margin-bottom:14px}
.sl-bullet{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:700;color:#111;margin-bottom:9px}
.sl-bullet::before{content:'';width:7px;height:7px;border-radius:50%;background:#1B3A57;flex-shrink:0}
table.report-table{width:100%;border-collapse:collapse;font-size:13px;box-shadow:0 1px 4px rgba(20,40,70,.06)}
table.report-table th{background:#8FA6C2;color:#fff;font-weight:700;padding:9px 7px;text-align:center;border:1px solid #fff}
table.report-table td{padding:8px 7px;text-align:center;border:1px solid #DCE1EA;color:#222;line-height:1.5}
table.report-table tr:nth-child(even) td{background:#F6F8FB}
table.report-table tr.total-row td{background:#E9F1FB;font-weight:700;color:#1B3A57}
.delta-up{color:#E03A3A;font-weight:700}
.delta-down{color:#1E6FD9;font-weight:700}
.delta-flat{color:#888}
.sl-footnote{margin-top:14px;font-size:12px;color:#8A8F99;text-align:right}
.sec-header{display:flex;align-items:center;gap:12px;margin:16px 0 10px}
.sec-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#1B3A57,#2F6FB3);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(27,58,87,.22)}
.sec-title{font-size:19px;font-weight:800;color:#111}
.sec-underline{width:60px;height:4px;background:linear-gradient(90deg,#1B3A57,#5FA8E0);border-radius:2px;margin:0 0 18px}
.pg-footer{position:absolute;bottom:12px;left:46px;right:46px;display:flex;justify-content:space-between;font-size:10px;color:#B0B6C0;border-top:1px solid #EEF0F4;padding-top:5px}
.sec-divider{height:1px;background:#E5E9F0;margin:12px 0}
.title-slide{position:relative;overflow:hidden;background:linear-gradient(160deg,#0B2A4A 0%,#1B3A57 55%,#2F6FB3 130%);display:flex;flex-direction:column;align-items:center;justify-content:center;height:720px;text-align:center}
.ts-circle{position:absolute;border-radius:50%;background:rgba(255,255,255,.06)}
.ts-circle-1{width:340px;height:340px;top:-140px;right:-120px}
.ts-circle-2{width:420px;height:420px;bottom:-200px;left:-140px;background:rgba(255,255,255,.045)}
.ts-badge{width:64px;height:64px;border-radius:18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin-bottom:22px;position:relative;z-index:1}
.ts-eyebrow{font-size:13px;font-weight:700;letter-spacing:.22em;color:rgba(255,255,255,.55);margin-bottom:18px;position:relative;z-index:1}
.title-slide .rt{font-size:32px;font-weight:800;color:#fff;margin-bottom:20px;line-height:1.5;padding:0 150px;position:relative;z-index:1}
.ts-divider{width:64px;height:2px;background:rgba(255,255,255,.35);margin-bottom:16px;position:relative;z-index:1}
.title-slide .rd{font-size:15px;color:rgba(255,255,255,.65);letter-spacing:.03em;position:relative;z-index:1}
.ts-bottom-bar{position:absolute;bottom:0;left:0;right:0;height:9px;background:linear-gradient(90deg,#5FA8E0,#9ED0F0)}
.content-thumb{width:44px;height:44px;object-fit:cover;border-radius:4px;border:1px solid #DCE1EA}
.content-thumb-empty{width:44px;height:44px;border-radius:4px;border:1px dashed #C7CEDA;display:flex;align-items:center;justify-content:center;font-size:8px;color:#B0B6C0}
.sticky-bar{position:sticky;bottom:0;background:#fff;border-top:1px solid #E8EAF0;padding:14px 20px;display:flex;gap:10px;align-items:center;justify-content:flex-end;margin:0 -20px -80px;box-shadow:0 -4px 16px rgba(0,0,0,.04)}
.sticky-bar .status{margin-right:auto;font-size:12px;color:#6B7080}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <button class="btn btn-sm" onclick="goHome()">← 포털 홈으로</button>
    <span class="crumb" id="breadcrumb"></span>
  </div>
  <div id="page-root"></div>
</div>

<script>
/* ══════════════ 상태 & 영속성 ══════════════ */
let accounts = [];
let currentAccountId = null;
let currentReportId = null;
let currentIgReportId = null;
let currentTsReportId = null;
let currentOtherReportId = null;
let currentPage = 'accounts'; // accounts | account-detail | report-type | blog-report-list | blog-report | instagram-report-list | instagram-report | tistory-report-list | tistory-report | other-report-list | other-report
let uidSeq = 1;
function uid(){
  if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'x' + Date.now().toString(36) + Math.random().toString(36).slice(2,10);
}

let saveTimer = null;
async function migrateLocalDataToServer(){
  let raw;
  try { raw = localStorage.getItem('report_tool_accounts_v3'); } catch(e){}
  if(!raw){ alert('이 브라우저에 저장된 로컬 데이터가 없어요.'); return; }
  let localAccounts;
  try { localAccounts = JSON.parse(raw); } catch(e){ alert('로컬 데이터를 읽는 데 실패했어요.'); return; }
  if(!Array.isArray(localAccounts) || !localAccounts.length){ alert('이 브라우저에 저장된 로컬 데이터가 없어요.'); return; }
  if(!confirm(`로컬에 저장된 계정 ${localAccounts.length}개를 서버로 올릴까요? 서버에 이미 같은 이름의 계정이 있으면 각각 새 계정으로 추가됩니다.`)) return;
  localAccounts.forEach(a => { a.id = uid(); });
  accounts = accounts.concat(localAccounts);
  migrateAccounts();
  saveState();
  try { localStorage.removeItem('report_tool_accounts_v3'); } catch(e){}
  alert('서버로 올렸어요!');
  render();
}
function saveState(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      const rows = accounts.map(a => ({ id:a.id, data:a, updated_at:new Date().toISOString() }));
      if(rows.length) await sb.from('report_accounts').upsert(rows);
    } catch(e){ console.error('저장 실패', e); }
  }, 600);
}
async function loadState(){
  try {
    const { data, error } = await sb.from('report_accounts').select('id,data');
    if(error) throw error;
    accounts = (data||[]).map(row => row.data);
  } catch(e){ console.error('불러오기 실패', e); accounts = []; }
  migrateAccounts();
}
function migrateAccounts(){
  let changed = false;
  accounts.forEach(a=>{
    if(!Array.isArray(a.blogReports)){
      const now = new Date().toISOString();
      a.blogReports = a.blogReport ? [{ id: uid(), createdAt: now, updatedAt: now, ...a.blogReport }] : [];
      delete a.blogReport;
      changed = true;
    }
    a.blogReports.forEach(r=>{
      if(!r.insights){ r.insights = { monthlyStats:'', viewTrend:'', demographics:'', inflow:'', popularRank:'' }; changed = true; }
      if(!r.insightsEdited){ r.insightsEdited = { monthlyStats:false, viewTrend:false, demographics:false, inflow:false, popularRank:false }; changed = true; }
      if(!r.keywordExposure){ r.keywordExposure = { rows:[blankKeywordRow()], images:[] }; changed = true; }
    });
    if(!Array.isArray(a.instagramReports)){ a.instagramReports = []; changed = true; }
    if(!a.igHistory){ a.igHistory = { followers:{}, reach:{}, impressions:{} }; changed = true; }
    a.instagramReports.forEach(r=>{
      if(!r.contentInsights){ r.contentInsights = { rows: [] }; changed = true; }
      if(!Array.isArray(r.featuredContents)){ r.featuredContents = [blankFeaturedContent()]; changed = true; }
      if(!r.contentGrid){ r.contentGrid = { rows: [] }; changed = true; }
      if(!r.planCalendar){ r.planCalendar = { rows: [] }; changed = true; }
      if(!r.meta.planMonth){ r.meta.planMonth = shiftMonth(r.meta.targetMonth,1); changed = true; }
      if(r.igInsightText === undefined){ r.igInsightText = ''; changed = true; }
      if(!r.sections){ r.sections = { followerTrend:true, reachSummary:true, contentInsights:true, featured:true, contentGrid:true, plan:true }; changed = true; }
    });
    if(!Array.isArray(a.tistoryReports)){ a.tistoryReports = []; changed = true; }
    if(!a.tistoryHistory){ a.tistoryHistory = { views:{} }; changed = true; }
    a.tistoryReports.forEach(r=>{
      if(!r.inflowSearch){ r.inflowSearch = blankInflowMap(TS_INFLOW_SEARCH_CATS); changed = true; }
      if(!r.inflowOther){ r.inflowOther = blankInflowMap(TS_INFLOW_OTHER_CATS); changed = true; }
      if(!r.weeklyContent){ r.weeklyContent = { rows: [] }; changed = true; }
      if(!r.popularPosts){ r.popularPosts = { rows: [] }; changed = true; }
      if(!r.posts){ r.posts = { rows: [] }; changed = true; }
      if(!r.sections){ r.sections = { viewTrend:true, inflow:true, content:true, popularPosts:true, posts:true }; changed = true; }
    });
    if(!Array.isArray(a.otherReports)){ a.otherReports = []; changed = true; }
    a.otherReports.forEach(r=>{
      if(!r.items){ r.items = { rows: [] }; changed = true; }
      if(r.meta.sectionTitle === undefined){ r.meta.sectionTitle = ''; changed = true; }
    });
  });
  if(changed) saveState();
}

function esc(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d){
  if(!d) return '';
  const [y,m,day] = d.split('-');
  return `${y}.${m}.${day}`;
}
function fmtDateTime(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function monthsSinceContract(contractDate){
  if(!contractDate) return null;
  const start = new Date(contractDate);
  const now = new Date();
  let months = (now.getFullYear()-start.getFullYear())*12 + (now.getMonth()-start.getMonth());
  if(now.getDate() < start.getDate()) months--;
  return Math.max(0, months) + 1;
}

/* ══════════════ 계정 모델 ══════════════ */
function newAccount(){
  return {
    id: uid(),
    company:'', contractManager:'', workManager:'', contractDate:'',
    blogReports: [],
    instagramReports: [],
    igHistory: { followers:{}, reach:{}, impressions:{} },
    tistoryReports: [],
    tistoryHistory: { views:{} },
    otherReports: [],
  };
}
function newBlogReport(workManager){
  const now = new Date().toISOString();
  return {
    id: uid(),
    createdAt: now, updatedAt: now,
    meta: { reportTitle:'', author:workManager||'', date:new Date().toISOString().slice(0,10), rangeFrom:'', rangeTo:'', targetMonth:'' },
    monthlyCache: { views:{}, visitors:{} },
    monthlyStats: [],
    viewTrend: { points: [] },
    demographics: { ageGroups: [] },
    inflow: { engines: [], keywords: [] },
    popularRank: { rows: [] },
    posts: [ blankPostRow() ],
    keywordExposure: { rows: [ blankKeywordRow() ], images: [] },
    importedFlags: { views:false, visitors:false, demographics:false, inflow:false, popularRank:false },
    insights: { monthlyStats:'', viewTrend:'', demographics:'', inflow:'', popularRank:'' },
    insightsEdited: { monthlyStats:false, viewTrend:false, demographics:false, inflow:false, popularRank:false },
  };
}
function blankPostRow(){ return {id:uid(), date:'', image:'', title:'', url:''}; }
function blankKeywordRow(){ return {id:uid(), keyword:'', content:''}; }
function blankKeywordImage(image){ return {id:uid(), image:image||''}; }

/* ── 인스타그램 보고서 모델 ── */
function defaultTargetMonth(){ return new Date().toISOString().slice(0,7); }
function newInstagramReport(workManager){
  const now = new Date().toISOString();
  const tm = defaultTargetMonth();
  return {
    id: uid(),
    createdAt: now, updatedAt: now,
    meta: { reportTitle:'', author:workManager||'', date:new Date().toISOString().slice(0,10), rangeFrom:'', rangeTo:'', targetMonth:tm, planMonth:shiftMonth(tm,1) },
    contentInsights: { rows: [] },
    featuredContents: [ blankFeaturedContent() ],
    contentGrid: { rows: [] },
    planCalendar: { rows: [] },
    igInsightText: '',
    sections: { followerTrend:true, reachSummary:true, contentInsights:true, featured:true, contentGrid:true, plan:true },
  };
}
function blankIgInsightRow(){ return {id:uid(), date:'', content:'', reach:'', impressions:'', engagement:''}; }
function blankFeaturedContent(){ return {id:uid(), image:'', title:'', description:'', exposure:'', engagement:''}; }
function blankGridRow(){ return {id:uid(), date:'', image:''}; }
function blankPlanRow(){ return {id:uid(), date:'', text:''}; }
function shiftMonth(ym, delta){
  if(!ym) return '';
  let [y,m] = ym.split('-').map(Number);
  m += delta;
  while(m<1){ m+=12; y--; }
  while(m>12){ m-=12; y++; }
  return `${y}-${String(m).padStart(2,'0')}`;
}
function getCurrentIgReport(account){
  if(!account) return null;
  return account.instagramReports.find(r=>r.id===currentIgReportId) || null;
}

/* ── 티스토리 보고서 모델 ── */
function newTistoryReport(workManager){
  const now = new Date().toISOString();
  const tm = defaultTargetMonth();
  return {
    id: uid(),
    createdAt: now, updatedAt: now,
    meta: { reportTitle:'', author:workManager||'', date:new Date().toISOString().slice(0,10), rangeFrom:'', rangeTo:'', targetMonth:tm },
    inflowSearch: blankInflowMap(TS_INFLOW_SEARCH_CATS),
    inflowOther: blankInflowMap(TS_INFLOW_OTHER_CATS),
    weeklyContent: { rows: [] },
    popularPosts: { rows: [] },
    posts: { rows: [] },
    sections: { viewTrend:true, inflow:true, content:true, popularPosts:true, posts:true },
  };
}
function blankWeeklyRow(){ return {id:uid(), label:'', dateRange:'', count:''}; }

/* ══════════════ 페이지 3-b: 블로그 보고서 목록 ══════════════ */
function renderBlogReportListPage(a){
  if(!a) return `<div class="empty-msg">계정을 찾을 수 없습니다.</div>`;
  const reports = a.blogReports.slice().sort((x,y)=>new Date(y.updatedAt)-new Date(x.updatedAt));
  return `
    <h1>${esc(a.company)} · 블로그 보고서 목록</h1>
    <p class="lead">이전에 만든 보고서를 열어서 이어서 수정하거나, 새 보고서를 만들 수 있어요.</p>
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="btn btn-primary" onclick="createBlogReport('${a.id}')">+ 새 보고서 만들기</button>
    </div>
    <div class="card">
      <div class="card-body" style="padding:0">
        ${reports.length ? `
        <table class="acct-table">
          <thead><tr><th>보고서 명칭</th><th>데이터 기준일</th><th>최종 수정</th><th></th></tr></thead>
          <tbody>${reports.map(r=>`
            <tr class="acct-row" onclick="openBlogReport('${a.id}','${r.id}')">
              <td>${esc(r.meta.reportTitle)||'(제목 미입력)'}</td>
              <td>${r.meta.rangeFrom?fmtDate(r.meta.rangeFrom)+' ~ '+fmtDate(r.meta.rangeTo):'-'}</td>
              <td>${fmtDateTime(r.updatedAt)}</td>
              <td style="white-space:nowrap">
                <span id="dl-status-${r.id}" style="font-size:10px;color:#9EA5B8;margin-right:6px"></span>
                <button class="btn btn-sm" onclick="event.stopPropagation();exportPDF('${a.id}','${r.id}','dl-status-${r.id}')">📄 PDF 다운로드</button>
                <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteBlogReport('${a.id}','${r.id}')">삭제</button>
              </td>
            </tr>`).join('')}</tbody>
        </table>` : `<div class="empty-msg">아직 만든 보고서가 없습니다. "+ 새 보고서 만들기"로 시작해보세요.</div>`}

    </div>

}

function renderInstagramReportPage(a){
  if(!a) return `<div class="empty-msg">계정을 찾을 수 없습니다.</div>`;
  const ir = getCurrentIgReport(a);
  if(!ir) return `<div class="empty-msg">보고서를 찾을 수 없습니다.</div>`;
  const hist = a.igHistory;
  const tm = ir.meta.targetMonth;
  const prevTm = shiftMonth(tm, -1);
  const curFollowers = tm ? (hist.followers[tm] ?? '') : '';
  const curReach = tm ? (hist.reach[tm] ?? '') : '';
  const curImpr = tm ? (hist.impressions[tm] ?? '') : '';

/* ══════════════ AI 연동 (claude2 Netlify 함수 재사용) ══════════════ */
function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function callClaude2(content, tools){
  const body = { model:'claude-sonnet-5', max_tokens:6000, messages:[{ role:'user', content }] };
  if(tools) body.tools = tools;
  const res = await fetch('/.netlify/functions/claude2', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  return data.result;
}
async function aiExtractPopularPosts(accountId, input){
  const file = input.files[0];
  if(!file) return;
  const a = accounts.find(x=>x.id===accountId);
  const tr = getCurrentTsReport(a);
  if(!tr) return;
  const statusEl = document.getElementById('popular-ai-status-'+accountId);
  if(statusEl) statusEl.textContent = '🤖 AI가 캡처를 읽는 중...';
  try {
    const base64 = await fileToBase64(file);
    const result = await callClaude2([
      { type:'image', source:{ type:'base64', media_type: file.type || 'image/png', data: base64 } },
      { type:'text', text: '이 이미지는 블로그/티스토리 관리자 통계의 인기글 목록입니다. 표에는 콘텐츠 제목, 공감수, 댓글수, 조회수, 작성일 열이 있습니다. 각 행을 순서대로 빠짐없이 읽어서 다섯 항목을 모두 추출하세요. 작성일은 이미지에 보이는 그대로 정확한 연-월-일을 읽어서 반드시 YYYY-MM-DD 형식(예: 2026-04-07)으로 변환해 넣으세요. 공감수/댓글수/조회수가 0으로 보이면 0을 그대로 넣으세요(빈 값으로 두지 마세요). 반드시 아래 JSON 형식으로만 응답하고, JSON 외에 다른 텍스트는 절대 포함하지 마세요.\n{"items":[{"title":"","likes":0,"comments":0,"views":0,"date":"YYYY-MM-DD"}]}' }
    ]);
    const items = (result && result.items) || [];
    if(!items.length){ if(statusEl) statusEl.textContent = '⚠ 인식된 항목이 없어요. 표에 직접 입력해주세요.'; return; }
    const numOrBlank = v => (v===undefined || v===null || v==='') ? '' : v;
    items.forEach(it=>{
      tr.popularPosts.rows.push({ id:uid(), title:it.title||'', likes:numOrBlank(it.likes), comments:numOrBlank(it.comments), views:numOrBlank(it.views), date:it.date||'' });
    });
    touchReport(tr);
    saveState();
    if(statusEl) statusEl.textContent = `✅ ${items.length}개 항목을 자동으로 채웠어요. 숫자가 맞는지 한번 확인해주세요.`;
    render();
  } catch(err){
    if(statusEl) statusEl.textContent = '❌ 인식 실패: ' + err.message;
  }
}
async function aiFetchPostTitle(accountId, rowId, btn){
  const a = accounts.find(x=>x.id===accountId);
  const tr = getCurrentTsReport(a);
  if(!tr) return;
  const row = tr.posts.rows.find(r=>r.id===rowId);
  if(!row || !row.url){ alert('URL을 먼저 입력해주세요.'); return; }
  const orig = btn.textContent;
  btn.textContent = '...'; btn.disabled = true;
  try {
    const res = await fetch('/.netlify/functions/fetch-title', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ url: row.url })
    });
    const data = await res.json();
    if(data.title){
      updateTsPostRow(accountId, rowId, 'title', data.title);
      render();
    } else {
      alert(data.error || '제목을 찾지 못했어요. 직접 입력해주세요.');
    }
  } catch(err){
    alert('제목 가져오기 실패: ' + err.message);
  } finally {
    btn.textContent = orig; btn.disabled = false;
  }
}

/* ══════════════ 네이버 블로그 통계 엑셀 파서 ══════════════ */
function parseNaverExport(rows){
  const dataNameRow = rows.find(r=>r[0]==='데이터명');
  const dataName = dataNameRow ? String(dataNameRow[1]||'').trim() : '';
  const periodRow = rows.find(r=>r[0]==='데이터 기간');
  const periodRaw = periodRow ? String(periodRow[1]||'') : '';
  const headerIdx = rows.findIndex(r=>['연령별','유입경로','순위','기간'].includes(r[0]));
  if(headerIdx === -1) return {type:'unknown'};
  const dataRows = rows.slice(headerIdx+1).filter(r=>r.some(c=>c!==undefined && c!==null && c!==''));

  let result;
  if(dataName.includes('성연령') || rows[headerIdx][0]==='연령별') result = parseDemographicsRows(dataRows);
  else if(dataName.includes('유입분석') || rows[headerIdx][0]==='유입경로') result = parseInflowRows(dataRows);
  else if(dataName.includes('조회수 순위') || rows[headerIdx][0]==='순위') result = parsePopularRankRows(dataRows);
  else if(dataName==='조회수') result = parseMonthlySeriesRows(dataRows, 'views');
  else if(dataName==='순방문자수') result = parseMonthlySeriesRows(dataRows, 'visitors');
  else return {type:'unknown', dataName};

  const singleMonthMatch = periodRaw.match(/(\d{4})\.(\d{2})\.(\d{2})\.\s*월간/);
  if(singleMonthMatch) result.singleMonth = {year:singleMonthMatch[1], month:singleMonthMatch[2]};
  return result;
}

function parseDemographicsRows(dataRows){
  const map = {}; const order = [];
  let currentLabel = null;
  dataRows.forEach(r=>{
    const raw = r[0] || currentLabel;
    currentLabel = raw;
    if(!raw || raw==='전체') return;
    const label = raw==='60-' ? '60세-' : raw+'세';
    const gender = r[1];
    const rate = parseFloat(r[3]) || 0;
    if(!map[label]){ map[label] = {label, male:'', female:''}; order.push(label); }
    if(gender==='남') map[label].male = rate;
    if(gender==='여') map[label].female = rate;
  });
  return {type:'demographics', ageGroups: order.map(l=>map[l])};
}

function parseInflowRows(dataRows){
  const engineMap = {}; const engineOrder = []; const keywords = [];
  let curEngine = null, curRate = null;
  dataRows.forEach(r=>{
    const engine = r[0] || curEngine;
    const rate = (r[1]!==undefined && r[1]!==null && r[1]!=='') ? r[1] : curRate;
    curEngine = engine; curRate = rate;
    if(engine && !(engine in engineMap)){ engineMap[engine] = parseFloat(rate)||0; engineOrder.push(engine); }
    const detail = r[2]; const detailRate = r[3];
    const engineNorm = curEngine ? String(curEngine).replace(/\s+/g,'') : '';
    const isMobileIntegratedSearch = /통합검색_?모바일$/.test(engineNorm) && !/블로그/.test(engineNorm);
    const detailStr = detail!=null ? String(detail).trim() : '';
    const isRealKeyword = detailStr && detailStr !== '기타' && !/^https?:\/\//i.test(detailStr);
    if(isMobileIntegratedSearch && isRealKeyword){
      keywords.push({keyword:detailStr, rate:parseFloat(detailRate)||0});
    }
  });
  keywords.sort((a,b)=>b.rate-a.rate);
  return {type:'inflow', engines: engineOrder.map(name=>({name, value:engineMap[name]})), keywords};
}

function parsePopularRankRows(dataRows){
  const rows = dataRows.map(r=>{
    const m = String(r[3]||'').match(/(\d{4})\.(\d{2})\.(\d{2})/);
    const date = m ? `${m[1]}-${m[2]}-${m[3]}` : '';
    return { title:String(r[1]||''), views:parseInt(r[2])||0, date };
  });
  return {type:'popularRank', rows};
}

function parseMonthlySeriesRows(dataRows, kind){
  const points = dataRows.map(r=>{
    const m = String(r[0]||'').match(/(\d{4})-(\d{2})-\d{2}~/);
    return { year:m?m[1]:'', month:m?m[2]:'', value:parseInt(r[2])||0 };
  }).filter(p=>p.year).reverse();
  return {type:'monthlySeries', kind, points};
}

function ingestNaverParsed(account, parsed){
  const br = getCurrentReport(account);
  if(!br) return;
  if(parsed.type === 'demographics'){
    br.demographics.ageGroups = parsed.ageGroups.map(g=>({id:uid(), ...g}));
    br.importedFlags.demographics = true;
    autoFillInsight(br, 'demographics', insight_demographics(br.demographics.ageGroups));
  } else if(parsed.type === 'inflow'){
    if(parsed.engines.length) br.inflow.engines = parsed.engines.slice().sort((x,y)=>y.value-x.value).slice(0,5).map(e=>({id:uid(), ...e}));
    if(parsed.keywords.length) br.inflow.keywords = parsed.keywords.slice(0,5).map(k=>({id:uid(), ...k}));
    br.importedFlags.inflow = true;
    autoFillInsight(br, 'inflow', insight_inflow(br.inflow.engines, br.inflow.keywords));
  } else if(parsed.type === 'popularRank'){
    br.popularRank.rows = parsed.rows.slice(0,10).map(r=>({id:uid(), ...r}));
    br.importedFlags.popularRank = true;
    autoFillInsight(br, 'popularRank', insight_popularRank(br.popularRank.rows));
  } else if(parsed.type === 'monthlySeries'){
    parsed.points.forEach(p=>{ br.monthlyCache[parsed.kind][`${p.year}-${p.month}`] = p.value; });
    if(parsed.kind === 'views'){
      br.viewTrend.points = parsed.points.slice(-12).map(p=>({id:uid(), year:p.year, month:p.month, value:p.value}));
      autoFillInsight(br, 'viewTrend', insight_viewTrend(br.viewTrend.points));
    }
    br.importedFlags[parsed.kind] = true;
    rebuildMonthlyStats(account);
    autoFillInsight(br, 'monthlyStats', insight_monthlyStats(br.monthlyStats));
  }
  if(parsed.singleMonth && !br.meta.targetMonth){
    const {year, month} = parsed.singleMonth;
    br.meta.targetMonth = `${year}-${month}`;
    const lastDay = new Date(Number(year), Number(month), 0).getDate();
    if(!br.meta.rangeFrom) br.meta.rangeFrom = `${year}-${month}-01`;
    if(!br.meta.rangeTo) br.meta.rangeTo = `${year}-${month}-${String(lastDay).padStart(2,'0')}`;
    if(!br.meta.reportTitle) br.meta.reportTitle = `${account.company} ${parseInt(month,10)}월 블로그 운영 보고서`;
  }
  touchReport(br);
}
function autoFillInsight(br, key, text){
  if(!br.insightsEdited[key]) br.insights[key] = text;
}

function regenerateInsight(accountId, key){
  const a = accounts.find(x=>x.id===accountId);
  const br = getCurrentReport(a);
  if(!br) return;
  const generators = {
    monthlyStats: ()=>insight_monthlyStats(br.monthlyStats),
    viewTrend: ()=>insight_viewTrend(br.viewTrend.points),
    demographics: ()=>insight_demographics(br.demographics.ageGroups),
    inflow: ()=>insight_inflow(br.inflow.engines, br.inflow.keywords),
    popularRank: ()=>insight_popularRank(br.popularRank.rows),
  };
  br.insightsEdited[key] = false;
  br.insights[key] = generators[key]();
  touchReport(br);
  saveState();
  render();
}

function rebuildMonthlyStats(account){
  const br = getCurrentReport(account);
  if(!br) return;
  const cache = br.monthlyCache;
  const keys = [...new Set([...Object.keys(cache.views), ...Object.keys(cache.visitors)])].sort();
  const last3 = keys.slice(-3);
  if(!last3.length) return;
  const existingByKey = {};
  br.monthlyStats.forEach(row=>{ if(row._key) existingByKey[row._key] = row; });
  br.monthlyStats = last3.map(key=>{
    const [y,m] = key.split('-');
    const prior = existingByKey[key];
    return {
      _key: key,
      label: `${parseInt(m,10)}월`,
      published: prior ? prior.published : '',
      views: cache.views[key] !== undefined ? cache.views[key] : '',
      visitors: cache.visitors[key] !== undefined ? cache.visitors[key] : '',
    };
  });
}

function handleNaverExcelUpload(accountId, input){
  const files = Array.from(input.files||[]);
  if(!files.length) return;
  const a = accounts.find(x=>x.id===accountId);
  if(!a) return;
  const statusEl = document.getElementById('naver-import-status');
  let done = 0, recognized = 0, unknownNames = [];
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const wb = XLSX.read(new Uint8Array(evt.target.result), {type:'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
        const parsed = parseNaverExport(rows);
        if(parsed.type === 'unknown'){ unknownNames.push(file.name); }
        else { ingestNaverParsed(a, parsed); recognized++; }
      } catch(err){ unknownNames.push(file.name+' (읽기 오류)'); }
      done++;
      if(done === files.length){
        if(statusEl) statusEl.textContent = `${recognized}개 파일 인식 완료` + (unknownNames.length?`, 인식 못한 파일: ${unknownNames.join(', ')}`:'');
        saveState();
        render();
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

/* ══════════════ 차트 SVG 생성 ══════════════ */
const PALETTE = ['#0B2A4A','#2F6FB3','#5FA8E0','#9ED0F0','#C9C9C9','#7E8B99','#B7C4D6','#3D5A80'];

function pieChartSVG(data, size){
  size = size || 220;
  const cx=size/2, cy=size/2, r=size/2-4;
  const total = data.reduce((s,d)=>s+(Number(d.value)||0),0);
  let paths = '';
  if(total<=0){
    paths = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#EEF0F4"/>`;
  } else {
    let angle = -90;
    data.forEach(d=>{
      const val = Number(d.value)||0;
      if(val<=0) return;
      const slice = val/total*360;
      const x1 = cx + r*Math.cos(angle*Math.PI/180);
      const y1 = cy + r*Math.sin(angle*Math.PI/180);
      const endAngle = angle+slice;
      const x2 = cx + r*Math.cos(endAngle*Math.PI/180);
      const y2 = cy + r*Math.sin(endAngle*Math.PI/180);
      const largeArc = slice>180?1:0;
      paths += `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${largeArc} 1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${d.color}"/>`;
      angle = endAngle;
    });
  }
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${paths}<circle cx="${cx}" cy="${cy}" r="${r*0.55}" fill="#fff"/></svg>`;
}
function pieLegendHtml(data){
  const total = data.reduce((s,d)=>s+(Number(d.value)||0),0);
  const shown = data.filter(d=>Number(d.value)>0);
  if(!shown.length) return `<div style="font-size:11px;color:#9EA5B8">데이터를 입력해주세요</div>`;
  return `<div style="display:flex;flex-direction:column;gap:5px">${shown.map(d=>{
    const val = Number(d.value)||0;
    const pct = total? (val/total*100).toFixed(1) : '0.0';
    return `<div style="display:flex;align-items:center;gap:7px;font-size:11px"><span style="width:9px;height:9px;border-radius:2px;background:${d.color};display:inline-block;flex-shrink:0"></span><span style="flex:1;color:#333">${esc(d.label)}</span><span style="font-weight:700;color:#111">${val.toLocaleString()} (${pct}%)</span></div>`;
  }).join('')}</div>`;
}
function inflowChartData(map, cats){
  return cats.map((c,i)=>({label:c, value:Number(map[c])||0, color:PALETTE[i%PALETTE.length]}));
}

function lineChartSVG(points, renderH){
  const w=1150, h=300, padL=50, padR=24, padT=30, padB=40;
  const chartW=w-padL-padR, chartH=h-padT-padB;
  const vals = points.map(p=>Number(p.value)||0);
  const maxV = Math.max(1, ...vals);
  const n = Math.max(points.length,1);
  const step = n>1 ? chartW/(n-1) : 0;
  let pathPts=[], dots='', labels='';
  points.forEach((p,i)=>{
    const v = Number(p.value)||0;
    const x = padL + step*i;
    const y = padT + chartH - chartH*(v/maxV);
    pathPts.push([x,y]);
    dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="#1B3A57"/>`;
    const above = i%2===0;
    labels += `<text x="${x.toFixed(1)}" y="${(above? y-10 : y+18).toFixed(1)}" font-size="11.5" text-anchor="middle" fill="#333" font-weight="700">${v.toLocaleString()}</text>`;
    const lbl = [p.year?p.year+'년':'', p.month?p.month+'월':''].filter(Boolean).join(' ');
    labels += `<text x="${x.toFixed(1)}" y="${(padT+chartH+18).toFixed(1)}" font-size="9.5" text-anchor="middle" fill="#888" transform="rotate(-40 ${x.toFixed(1)} ${(padT+chartH+18).toFixed(1)})">${esc(lbl)}</text>`;
  });
  const linePath = pathPts.map((pt,i)=>(i===0?'M':'L')+pt[0].toFixed(1)+','+pt[1].toFixed(1)).join(' ');
  let grid='';
  for(let g=0; g<=4; g++){
    const gy = padT + chartH - chartH*(g/4);
    const gv = Math.round(maxV*(g/4));
    grid += `<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${padL+chartW}" y2="${gy.toFixed(1)}" stroke="#EEF0F4"/>`;
    grid += `<text x="${padL-6}" y="${(gy+3).toFixed(1)}" font-size="9.5" text-anchor="end" fill="#999">${gv.toLocaleString()}</text>`;
  }
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${renderH||380}" xmlns="http://www.w3.org/2000/svg">
    ${grid}
    <path d="${linePath}" fill="none" stroke="#1B3A57" stroke-width="1.8"/>
    ${dots}${labels}
  </svg>`;
}

function multiSeriesBarChartSVG(categories, series, renderH){
  const w=1150, h=320, padL=40, padR=20, padT=24, padB=64;
  const chartW=w-padL-padR, chartH=h-padT-padB;
  const allVals = series.flatMap(s=>s.values.map(v=>Number(v)||0));
  const maxV = Math.max(1, ...allVals);
  const n = categories.length || 1;
  const groupW = chartW/n;
  const barGap = 2;
  const barW = Math.max(3,(groupW*0.62 - barGap*(series.length-1))/series.length);
  let bars='', labels='';
  categories.forEach((cat,ci)=>{
    const groupX = padL + groupW*ci + (groupW - (barW*series.length + barGap*(series.length-1)))/2;
    series.forEach((s,si)=>{
      const v = Number(s.values[ci])||0;
      const bh = chartH*(v/maxV);
      const x = groupX + si*(barW+barGap);
      const y = padT + chartH - bh;
      bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}" fill="${s.color||PALETTE[si%PALETTE.length]}" rx="1"/>`;
      if(v>0) labels += `<text x="${(x+barW/2).toFixed(1)}" y="${(y-4).toFixed(1)}" font-size="9.5" text-anchor="middle" fill="#333" font-weight="600">${v.toLocaleString()}</text>`;
    });
    labels += `<text x="${(padL+groupW*ci+groupW/2).toFixed(1)}" y="${(padT+chartH+16).toFixed(1)}" font-size="10" text-anchor="middle" fill="#888" transform="rotate(-30 ${(padL+groupW*ci+groupW/2).toFixed(1)} ${(padT+chartH+16).toFixed(1)})">${esc(cat)}</text>`;
  });
  const legend = series.map((s,si)=>`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:12px;color:#333"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${s.color||PALETTE[si%PALETTE.length]}"></span>${esc(s.name)}</span>`).join('');
  return `<div>
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="${renderH||390}" xmlns="http://www.w3.org/2000/svg">
      <line x1="${padL}" y1="${padT+chartH}" x2="${padL+chartW}" y2="${padT+chartH}" stroke="#DDE1E8"/>
      ${bars}${labels}
    </svg>
    <div style="text-align:center;margin-top:2px">${legend}</div>
  </div>`;
}

const CONTENT_W = PAGE_W - PAGE_PAD_X*2;
const FOOTER_RESERVE = 22;
const CONTENT_H = PAGE_H - PAGE_PAD_Y*2 - FOOTER_RESERVE;

function sectionHeader(title, iconKey){
  return `<div class="sec-header"><div class="sec-icon">${SECTION_ICONS[iconKey]||''}</div><div class="sec-title">${title}</div></div><div class="sec-underline"></div>`;

function emptyMsg(){ return `<p style="color:#9EA5B8;font-size:13px;margin-bottom:10px">엑셀을 업로드하면 자동으로 채워집니다</p>`; }

function measureBlockHeight(measureEl, html){
  measureEl.style.width = CONTENT_W + 'px';
  measureEl.innerHTML = html;
  void measureEl.offsetHeight;
  return measureEl.getBoundingClientRect().height;
}
function measureRows(measureEl, theadHtml, rowHtmls){
  measureEl.style.width = CONTENT_W + 'px';
  measureEl.innerHTML = `<table class="report-table" style="table-layout:fixed"><thead>${theadHtml}</thead><tbody>${rowHtmls.join('')}</tbody></table>`;
  void measureEl.offsetHeight;
  const table = measureEl.querySelector('table');
  const theadH = table.querySelector('thead').getBoundingClientRect().height;
  const trs = Array.from(table.querySelectorAll('tbody > tr'));
  return { theadH, rowHeights: trs.map(tr=>tr.getBoundingClientRect().height) };
}

/* 여러 섹션을 자연스럽게 이어붙여서 페이지를 채우는 흐름형 페이지네이션 엔진 */
const DIVIDER_HTML = `<div class="sec-divider"></div>`;
const DIVIDER_H = 25;
class FlowBuilder {
  constructor(measureEl){ this.measureEl = measureEl; this.pages = [[]]; this.used = 0; }
  ensureRoom(need){
    if(this.used > 0 && this.used + need > CONTENT_H){ this.pages.push([]); this.used = 0; }
  }
  push(html, h){ this.pages[this.pages.length-1].push(html); this.used += h; }
  forceNewPage(){
    if(this.used > 0){ this.pages.push([]); this.used = 0; }
  }
  addAtomic(html){
    const contentH = measureBlockHeight(this.measureEl, html);
    const continuing = this.used > 0;
    this.ensureRoom(contentH + (continuing ? DIVIDER_H : 0));
    const withDivider = this.used > 0 && continuing;
    if(withDivider) this.push(DIVIDER_HTML, DIVIDER_H);
    this.push(html, contentH);
  }
  addTable({prefixHtml='', theadHtml, rowHtmls, belowHtml='', emptyColspan=4}){
    if(!rowHtmls.length){
      this.addAtomic(prefixHtml + `<table class="report-table"><thead>${theadHtml}</thead><tbody><tr><td colspan="${emptyColspan}" style="color:#9EA5B8">데이터를 입력해주세요</td></tr></tbody></table>` + belowHtml);
      return;
    }
    const {theadH, rowHeights} = measureRows(this.measureEl, theadHtml, rowHtmls);
    const prefixH = prefixHtml ? measureBlockHeight(this.measureEl, prefixHtml) : 0;
    const continuing = this.used > 0;
    this.ensureRoom(prefixH + theadH + rowHeights[0] + (continuing ? DIVIDER_H : 0));
    const withDivider = this.used > 0 && continuing;
    if(withDivider) this.push(DIVIDER_HTML, DIVIDER_H);
    if(prefixHtml) this.push(prefixHtml, prefixH);
    let i = 0;
    while(i < rowHtmls.length){
      let bufRows = [], bufH = theadH;
      while(i < rowHtmls.length && bufH + rowHeights[i] <= (CONTENT_H - this.used)){
        bufRows.push(rowHtmls[i]); bufH += rowHeights[i]; i++;
      }
      if(bufRows.length === 0){ this.pages.push([]); this.used = 0; continue; }
      this.push(`<table class="report-table"><thead>${theadHtml}</thead><tbody>${bufRows.join('')}</tbody></table>`, bufH);
      if(i < rowHtmls.length){ this.pages.push([]); this.used = 0; }
    }
    if(belowHtml){
      const belowH = measureBlockHeight(this.measureEl, belowHtml);
      this.ensureRoom(belowH);
      this.push(belowHtml, belowH);
    }
  }
  finish(meta){
    return this.pages.filter(p=>p.length).map((frags,i,arr)=>
      `<div class="slide"><div class="sl-pad">${frags.join('')}</div><div class="pg-footer"><span>${esc(meta.reportTitle)}</span><span>${i+1} / ${arr.length}</span></div></div>`
    );
  }
}
function computeDelta(prev, cur){
  const p = Number(prev), q = Number(cur);
  if(prev===''||cur===''||prev===undefined||cur===undefined||isNaN(p)||isNaN(q)) return {diff:0, text:'-'};
  const diff = q - p;
  if(diff>0) return {diff, text:'▲'+diff.toLocaleString()};
  if(diff<0) return {diff, text:'▼'+Math.abs(diff).toLocaleString()};
  return {diff:0, text:'-'};
}
function deltaSuffix(prev, cur){
  const d = computeDelta(prev, cur);
  if(d.diff===0) return '';
  const cls = d.diff>0?'delta-up':'delta-down';
  return ` <span class="${cls}" style="font-size:12px">(${d.text})</span>`;
}

/* ══════════════ 코멘트 자동 생성 (규칙 기반 — 실서비스에서는 Claude API로 교체 예정) ══════════════ */
function pctChange(prev, cur){
  const p = Number(prev), c = Number(cur);
  if(prev===''||cur===''||isNaN(p)||isNaN(c)||p===0) return null;
  return (c-p)/p*100;
}
function insightBox(text){
  if(!text) return '';
  return `<div style="background:#F4F7FB;border-left:3px solid #1B3A57;border-radius:6px;padding:13px 17px;margin-top:16px;font-size:12.5px;line-height:1.8;color:#333"><b style="color:#1B3A57">💬 코멘트</b><br>${text}</div>`;
}
function insight_monthlyStats(months){
  const withData = months.filter(m=>m.views!=='' && m.visitors!=='');
  if(withData.length<2) return '';
  const last = withData[withData.length-1], prev = withData[withData.length-2];
  const vC = pctChange(prev.views, last.views);
  const uC = pctChange(prev.visitors, last.visitors);
  const parts = [];
  if(vC!==null) parts.push(vC>=0 ? `${last.label} 조회수가 전월 대비 ${vC.toFixed(1)}% 증가하며 긍정적인 흐름을 보였습니다.` : `${last.label} 조회수는 전월 대비 ${Math.abs(vC).toFixed(1)}% 감소했지만, 전반적인 방문 추이는 안정적인 수준을 유지하고 있습니다.`);
  if(uC!==null) parts.push(uC>=0 ? `순방문자수 역시 ${uC.toFixed(1)}% 늘어나며 채널에 대한 관심이 꾸준히 이어지고 있습니다.` : `순방문자수는 소폭 조정되었으나 큰 변동 없이 안정권을 유지했습니다.`);
  parts.push('일정한 발행 주기를 유지하면 자연스러운 유입 증가를 기대할 수 있습니다.');
  return parts.slice(0,3).join(' ');
}
function insight_viewTrend(points){
  const withVal = points.filter(p=>p.value!==''&&p.value!==undefined&&p.value!==0);
  if(withVal.length<3) return '';
  const last = Number(withVal[withVal.length-1].value);
  const avgAll = withVal.reduce((s,p)=>s+Number(p.value||0),0)/withVal.length;
  const diff = avgAll ? (last-avgAll)/avgAll*100 : 0;
  const trendWord = diff>=5?'평균을 상회하는':diff<=-5?'평균 대비 다소 낮은':'평균과 비슷한';
  return `최근 조회수는 ${last.toLocaleString()}회로, 최근 1년 ${trendWord} 수준을 보이고 있습니다. 계절적 이슈나 콘텐츠 주제 변화에 따른 자연스러운 흐름으로 해석되며, 꾸준한 발행을 통해 안정적인 성장을 이어갈 수 있을 것으로 보입니다.`;
}
function insight_demographics(rows){
  if(!rows.length) return '';
  let maxRow=rows[0], maxVal=-1, dominantGender='';
  rows.forEach(r=>{
    if(Number(r.male)>maxVal){ maxVal=Number(r.male); maxRow=r; dominantGender='남성'; }
    if(Number(r.female)>maxVal){ maxVal=Number(r.female); maxRow=r; dominantGender='여성'; }
  });
  return `${esc(maxRow.label)} ${dominantGender} 방문자 비중이 가장 높게 나타나, 해당 연령층을 겨냥한 콘텐츠 전략이 특히 효과적일 것으로 보입니다. 다양한 연령대에서 고르게 유입되고 있어 폭넓은 독자층을 확보하고 있는 것으로 분석됩니다.`;
}
function insight_inflow(engines, keywords){
  if(!engines.length) return '';
  const top = engines[0];
  const topKeyword = keywords[0];
  let text = `${esc(top.name)} 채널을 통한 유입이 ${top.value}%로 가장 큰 비중을 차지하고 있습니다.`;
  if(topKeyword) text += ` "${esc(topKeyword.keyword)}" 키워드가 상위 유입 검색어로 나타나 관련 주제에 대한 꾸준한 수요가 확인됩니다.`;
  text += ' 주요 유입 채널을 지속적으로 관리하면 안정적인 트래픽 확보에 도움이 될 것입니다.';
  return text;
}
function insight_popularRank(rows){
  if(!rows.length) return '';
  const top = rows[0];
  return `이번 기간 가장 높은 조회수를 기록한 콘텐츠는 "${esc(top.title)}"(${Number(top.views).toLocaleString()}회)였습니다. 독자 관심사를 잘 반영한 주제로, 유사한 톤의 콘텐츠를 추가 기획하면 좋은 반응을 이어갈 수 있을 것으로 보입니다.`;

function block_keywordExposureImages(br){
  const images = br.keywordExposure.images.filter(im=>im.image);
  if(!images.length) return [];
  const chunks = [];
  for(let i=0;i<images.length;i+=6) chunks.push(images.slice(i,i+6));
  return chunks.map((chunk,ci)=>{
    const grid = chunk.map(im=>`<div style="border:1px solid #E1E5EC;border-radius:8px;overflow:hidden;background:#F6F8FB"><img src="${im.image}" style="width:100%;height:170px;object-fit:contain;display:block;background:#fff"></div>`).join('');
    const header = ci===0 ? sectionHeader('노출 화면 캡처','keywordExposure') : '';
    return { type:'atomic', html: header + `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">${grid}</div>` };
  });
}

function monthLabel(ym){ return ym ? parseInt(ym.split('-')[1],10)+'월' : ''; }
function computeFollowerSeries(account, targetMonth){
  const hist = account.igHistory.followers;
  const keys = Object.keys(hist).filter(k=>hist[k]!=='' && hist[k]!=null).sort();
  const upto = targetMonth ? keys.filter(k=>k<=targetMonth) : keys;
  const last12 = upto.slice(-12);
  return last12.map(k=>{ const [y,m]=k.split('-'); return {year:y, month:m, value:hist[k]}; });
}
function block_igFollowerTrend(meta, account){
  const points = computeFollowerSeries(account, meta.targetMonth);
  const prevTm = shiftMonth(meta.targetMonth,-1);
  const curVal = meta.targetMonth ? account.igHistory.followers[meta.targetMonth] : null;
  const prevVal = prevTm ? account.igHistory.followers[prevTm] : null;
  const hasBoth = curVal!=null && curVal!=='' && prevVal!=null && prevVal!=='';
  const tableHtml = hasBoth ? `
    <table class="report-table" style="margin-top:16px">
      <thead><tr><th>구분</th><th>${monthLabel(prevTm)}</th><th>${monthLabel(meta.targetMonth)}</th><th>증감 추이</th></tr></thead>
      <tbody><tr><td style="font-weight:700">IG</td><td>${Number(prevVal).toLocaleString()}</td><td>${Number(curVal).toLocaleString()}</td><td>${deltaSuffix(prevVal,curVal)||'-'}</td></tr></tbody>
    </table>` : '';
  const html = sectionHeader('팔로워 추이','viewTrend') + (points.length ? lineChartSVG(points, 240) : emptyMsg()) + tableHtml;
  return {type:'atomic', html};
}
function block_igReachSummary(meta, account, insightText){
  const prevTm = shiftMonth(meta.targetMonth,-1);
  const curReach = meta.targetMonth ? account.igHistory.reach[meta.targetMonth] : null;
  const curImpr = meta.targetMonth ? account.igHistory.impressions[meta.targetMonth] : null;

  const prevImpr = prevTm ? account.igHistory.impressions[prevTm] : null;
  const hasData = (curReach!=null&&curReach!=='') || (prevReach!=null&&prevReach!=='');
  const chart = hasData ? multiSeriesBarChartSVG([monthLabel(prevTm), monthLabel(meta.targetMonth)], [
    {name:'도달', values:[prevReach||0, curReach||0], color:'#2F6FB3'},
    {name:'노출', values:[prevImpr||0, curImpr||0], color:'#E07B39'},

      </tbody>
    </table>`;
  const html = sectionHeader(`${monthLabel(meta.targetMonth)} 성과 지표 요약`,'monthlyStats') + chart + tableHtml + insightBox(insightText);

function block_igContentInsights(meta, ir){
  const rows = ir.contentInsights.rows.filter(r=>r.date||r.content);

function block_igContentGridChunks(rows){
  const valid = rows.filter(r=>r.image);
  if(!valid.length) return [];
  const chunks = [];

    return {type:'atomic', html};

function buildCalendarGridHtml(planMonth, items){
  if(!planMonth) return null;
  const [y,m] = planMonth.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  const startWeekday = new Date(y, m-1, 1).getDay();
  const cellsByDate = {};
  items.forEach(it=>{ if(it.date && it.text){ (cellsByDate[it.date] = cellsByDate[it.date]||[]).push(it.text); } });
  const totalRows = Math.ceil((startWeekday+daysInMonth)/7);
  let dayNum = 1, rowsHtml = '';
  for(let r=0;r<totalRows;r++){
    let rowHtml = '<tr>';
    for(let c=0;c<7;c++){
      const cellIndex = r*7+c;
      if(cellIndex<startWeekday || dayNum>daysInMonth){
        rowHtml += `<td style="background:#FAFAFB"></td>`;
      } else {
        const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
        const texts = cellsByDate[dateStr]||[];
        const weekendColor = c===0?'#E03A3A':(c===6?'#2F6FB3':'#333');
        rowHtml += `<td style="vertical-align:top;text-align:left;height:82px;padding:6px">
          <div style="font-size:11px;font-weight:700;color:${weekendColor};margin-bottom:4px">${dayNum}</div>
          ${texts.map(t=>`<div style="font-size:9.5px;color:#2F6FB3;line-height:1.4;margin-bottom:2px;word-break:break-all">${esc(t)}</div>`).join('')}
        </td>`;
        dayNum++;
      }
    }
    rowHtml += '</tr>';
    rowsHtml += rowHtml;
  }
  const dayHeaders = ['일','월','화','수','목','금','토'].map(d=>`<th>${d}</th>`).join('');
  return `<table class="report-table" style="table-layout:fixed"><thead><tr>${dayHeaders}</tr></thead><tbody>${rowsHtml}</tbody></table>`;
}
function block_igPlanCalendar(ir){
  const grid = buildCalendarGridHtml(ir.meta.planMonth, ir.planCalendar.rows);
  const html = sectionHeader(`${monthLabel(ir.meta.planMonth)} SNS Plan`,'igPlan') + (grid || emptyMsg());
  return {type:'atomic', html};
}

async function buildAllIgSlides(account, reportId){
  const ir = account.instagramReports.find(r=>r.id===reportId);
  if(!ir) return [];
  const meta = ir.meta;
  const measureEl = document.createElement('div');
  measureEl.style.position='fixed'; measureEl.style.left='-99999px'; measureEl.style.top='0';
  measureEl.style.fontFamily = "'Pretendard', sans-serif";
  document.body.appendChild(measureEl);
  let slides = [slide_title(meta)];
  try {
    const flow = new FlowBuilder(measureEl);
    let hasContent = false;
    const beforeSection = () => { if(hasContent) flow.forceNewPage(); hasContent = true; };
    if(ir.sections.followerTrend){
      beforeSection();
      flow.addAtomic(block_igFollowerTrend(meta, account).html);
    }
    if(ir.sections.reachSummary){
      beforeSection();
      flow.addAtomic(block_igReachSummary(meta, account, ir.igInsightText || '').html);
    }
    if(ir.sections.contentInsights){
      beforeSection();
      flow.addTable(block_igContentInsights(meta, ir));
    }
    if(ir.sections.featured){
      ir.featuredContents.filter(f=>f.image||f.title||f.description).forEach(item=>{
        beforeSection();
        flow.addAtomic(block_igFeatured(item).html);
      });
    }
    if(ir.sections.contentGrid){
      block_igContentGridChunks(ir.contentGrid.rows).forEach(b=>{
        beforeSection();
        flow.addAtomic(b.html);
      });
    }
    if(ir.sections.plan){
      beforeSection();
      flow.addAtomic(block_igPlanCalendar(ir).html);
    }
    slides = slides.concat(flow.finish(meta));
  } finally {
    document.body.removeChild(measureEl);
  }
  return slides;
}

async function exportIgPDF(accountId, reportId, statusElId){
  const a = accounts.find(x=>x.id===accountId);
  if(!a) return;

  const doc = new jsPDF({ orientation:'landscape', unit:'px', format:[PAGE_W,PAGE_H], compress:true });

  } finally {
    document.body.removeChild(offscreen);
  }
}

async function buildAllTsSlides(account, reportId){
  const tr = account.tistoryReports.find(r=>r.id===reportId);
  if(!tr) return [];
  const meta = tr.meta;
  const measureEl = document.createElement('div');
  measureEl.style.position='fixed'; measureEl.style.left='-99999px'; measureEl.style.top='0';
  measureEl.style.fontFamily = "'Pretendard', sans-serif";
  document.body.appendChild(measureEl);
  let slides = [slide_title(meta)];
  try {
    const flow = new FlowBuilder(measureEl);
    let flowHasContent = false;
    const startGroup = () => { if(flowHasContent) flow.forceNewPage(); };

    const overview = block_tsOverview(meta, tr, account);
    if(overview){ startGroup(); flow.addAtomic(overview.html); flowHasContent = true; }

    let g2 = false;
    if(tr.sections.content){ if(!g2) startGroup(); flow.addTable(block_tsWeeklyContent(meta, tr)); g2 = true; flowHasContent = true; }
    if(tr.sections.popularPosts){ if(!g2) startGroup(); flow.addTable(block_tsPopularPosts(meta, tr)); g2 = true; flowHasContent = true; }

    if(tr.sections.posts){
      startGroup();
      flow.addTable(block_tsPostsList(meta, tr));
      flowHasContent = true;
    }
    slides = slides.concat(flow.finish(meta));
  } finally {
    document.body.removeChild(measureEl);
  }
  return slides;
}

/* ══════════════ 기타 업로드 리스트 보고서 · 슬라이드 생성 ══════════════ */
function block_otherItemsChunk(sectionTitle, chunk){
  const theadHtml = `<tr><th style="width:16%">대표 이미지</th><th>콘텐츠</th><th style="width:16%">작성일</th></tr>`;
  const rowHtmls = chunk.map(r=>`
    <tr>
      <td style="text-align:center">${r.image?`<img src="${r.image}" style="width:110px;height:70px;object-fit:cover;border-radius:6px;border:1px solid #DCE1EA;display:block;margin:0 auto">`:`<span class="content-thumb-empty" style="margin:0 auto">없음</span>`}</td>
      <td style="text-align:left">${esc(r.title)||'-'}</td>
      <td>${r.date?fmtDate(r.date):'-'}</td>
    </tr>`);
  const prefixHtml = sectionHeader(sectionTitle || '업로드 리스트','contentImages');
  return {type:'table', prefixHtml, theadHtml, rowHtmls, emptyColspan:3};
}

async function buildAllOtherSlides(account, reportId){
  const or = account.otherReports.find(r=>r.id===reportId);
  if(!or) return [];
  const meta = or.meta;
  const measureEl = document.createElement('div');
  measureEl.style.position='fixed'; measureEl.style.left='-99999px'; measureEl.style.top='0';
  measureEl.style.fontFamily = "'Pretendard', sans-serif";
  document.body.appendChild(measureEl);
  let slides = [slide_title(meta)];
  try {
    const flow = new FlowBuilder(measureEl);
    const rows = or.items.rows.filter(r=>r.image||r.title||r.date);
    const chunks = [];
    for(let i=0;i<rows.length;i+=5) chunks.push(rows.slice(i,i+5));
    if(!chunks.length) chunks.push([]);
    chunks.forEach((chunk,i)=>{
      if(i>0) flow.forceNewPage();
      flow.addTable(block_otherItemsChunk(meta.sectionTitle, chunk));
    });
    slides = slides.concat(flow.finish(meta));
  } finally {
    document.body.removeChild(measureEl);
  }
  return slides;
}

async function exportOtherPDF(accountId, reportId, statusElId){
  const a = accounts.find(x=>x.id===accountId);
  if(!a) return;
  const or = a.otherReports.find(r=>r.id===reportId);
  if(!or) return;
  const status = statusElId ? document.getElementById(statusElId) : null;

  document.body.appendChild(offscreen);
  await document.fonts.ready;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'px', format:[PAGE_W,PAGE_H], compress:true });
  try {
    for(let i=0;i<slides.length;i++){
      if(status) status.textContent = `PDF 생성 중... (${i+1}/${slides.length})`;

      doc.addImage(imgData, 'JPEG', 0, 0, PAGE_W, PAGE_H);

    doc.save((or.meta.reportTitle || a.company+'_업로드리스트_보고서') + '.pdf');
    if(status) status.textContent = `완료! (${slides.length}페이지)`;

    else alert('PDF 생성 중 오류가 발생했습니다: ' + err.message);
  } finally {
    document.body.removeChild(offscreen);
  }
}

async function buildAllSlides(account, reportId){
  const br = account.blogReports.find(r=>r.id===reportId);
  if(!br) return [];
  const meta = br.meta;
  const measureEl = document.createElement('div');
  measureEl.style.position='fixed'; measureEl.style.left='-99999px'; measureEl.style.top='0';
  measureEl.style.fontFamily = "'Pretendard', sans-serif";
  document.body.appendChild(measureEl);
  let slides = [slide_title(meta)];
  try {
    const flow = new FlowBuilder(measureEl);
    flow.addAtomic(block_viewTrend(meta, br).html);
    flow.forceNewPage();
    flow.addAtomic(block_demographics(meta, br).html);
    flow.forceNewPage();
    flow.addTable(block_inflow(meta, br));
    flow.forceNewPage();
    flow.addTable(block_popularRank(meta, br));
    flow.forceNewPage();
    flow.addTable(block_contentImages(meta, br));
    flow.forceNewPage();
    flow.addTable(block_keywordExposureTable(meta, br));
    block_keywordExposureImages(br).forEach(b => flow.addAtomic(b.html));
    slides = slides.concat(flow.finish(meta));
  } finally {
    document.body.removeChild(measureEl);
  }
  return slides;
}
